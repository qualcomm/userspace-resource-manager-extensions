    ResID: "0x0004"
    Name: "RES_DDR_BWMON_SAMPLE_MS"
    Path: "/sys/devices/system/cpu/bus_dcvs/DDR/*.qcom,bwmon-ddr/min_freq"
    Supported: true
    Permissions: "third_party"
    Modes: ["display_on", "doze"]
    Policy: "instant_apply"
    ApplyType: "global"

  - ResType: "0x8a"
