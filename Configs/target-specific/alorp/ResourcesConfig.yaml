ResourceConfigs:
  - ResType: "0x0c"
    ResID: "0x0000"
    Name: "RES_DDR_BOOST_FREQ"
    Path: "/sys/devices/system/cpu/bus_dcvs/DDR/boost_freq"
    Supported: true
    LowThreshold: 0
    Permissions: "third_party"
    Modes: ["display_on", "doze"]
    Policy: "higher_is_better"
    ApplyType: "global"

  - ResType: "0x8a"
    ResID: "0x0000"
    Name: "RES_DDR_BWMON_SAMPLE_MS"
    Path: "/sys/devices/system/cpu/bus_dcvs/LLCC/*.qcom,bwmon-llcc-prime/sample_ms"
    Supported: true
    Permissions: "third_party"
    Modes: ["display_on", "doze"]
    Policy: "instant_apply"
    ApplyType: "global"

  - ResType: "0x8a"
    ResID: "0x0001"
    Name: "RES_DDR_BWMON_IO_PCT"
    Path: "/sys/devices/system/cpu/bus_dcvs/LLCC/*.qcom,bwmon-llcc-prime/io_percent"
    Supported: true
    Permissions: "third_party"
    Modes: ["display_on", "doze"]
    Policy: "instant_apply"
    ApplyType: "global"

  - ResType: "0x8a"
    ResID: "0x0002"
    Name: "RES_DDR_BWMON_HYST_LEN"
    Path: "/sys/devices/system/cpu/bus_dcvs/LLCC/*.qcom,bwmon-llcc-prime/hyst_length"
    Supported: true
    Permissions: "third_party"
    Modes: ["display_on", "doze"]
    Policy: "instant_apply"
